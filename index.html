<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card - Stage 0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <article class="todo-card" data-testid="test-todo-card" aria-label="Todo item card">
        <header class="todo-card__header">
          <h2 data-testid="test-todo-title" id="todo-title">Prepare frontend review meeting</h2>
          <div class="todo-card__badges">
            <span
              class="badge badge--priority"
              data-testid="test-todo-priority"
              aria-label="Priority High"
              >High</span
            >
            <select data-testid="test-todo-status-control" id="status-control" class="badge badge--status">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
            <span data-testid="test-todo-priority-indicator" class="priority-indicator"></span>
          </div>
        </header>

        <div data-testid="test-todo-collapsible-section" class="collapsible-section">
          <p data-testid="test-todo-description" class="todo-card__description">
            Finalize the deck, confirm demo links, and align talking points before the team walkthrough.
          </p>
        </div>
        <button type="button" data-testid="test-todo-expand-toggle" id="expand-toggle" aria-expanded="false">Expand</button>

        <div class="todo-card__dates">
          <time data-testid="test-todo-due-date" id="due-date" datetime="2026-04-16T15:00:00.000Z"
            >Due Apr 16, 2026</time
          >
          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            aria-live="polite"
            aria-atomic="true"
          ></time>
          <span data-testid="test-todo-overdue-indicator" class="overdue-indicator" style="display: none;">Overdue</span>
        </div>

        <div class="todo-card__meta">
          <div class="todo-card__toggle-wrap">
            <input
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
              type="checkbox"
              name="todo-complete"
            />
            <label for="todo-complete">Mark as completed</label>
          </div>

          <ul data-testid="test-todo-tags" class="todo-card__tags" role="list" aria-label="Task tags">
            <li data-testid="test-todo-tag-work">work</li>
            <li data-testid="test-todo-tag-urgent">urgent</li>
            <li>design</li>
          </ul>
        </div>

        <footer class="todo-card__actions">
          <button type="button" data-testid="test-todo-edit-button" id="edit-button">Edit</button>
          <button type="button" data-testid="test-todo-delete-button" id="delete-button">Delete</button>
        </footer>

        <form data-testid="test-todo-edit-form" id="edit-form" class="edit-form" style="display: none;">
          <input type="text" data-testid="test-todo-edit-title-input" id="edit-title-input" />
          <textarea data-testid="test-todo-edit-description-input" id="edit-description-input"></textarea>
          <select data-testid="test-todo-edit-priority-select" id="edit-priority-select">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
          <input type="datetime-local" data-testid="test-todo-edit-due-date-input" id="edit-due-date-input" />
          <button type="button" data-testid="test-todo-save-button" id="save-button">Save</button>
          <button type="button" data-testid="test-todo-cancel-button" id="cancel-button">Cancel</button>
        </form>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
